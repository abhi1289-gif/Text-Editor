<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Free Online Rich Text Editor</title>
    <meta
        name="description"
        content="A free online rich text editor with formatting tools, code view, text alignment, lists, links, and document export support."
    >
    <meta
        name="keywords"
        content="rich text editor, online editor, text editor, document editor, html editor, writing tool"
    >
    <meta name="author" content="Abhishek Sonparote">

    <meta property="og:title" content="A Nice Text Editor">
    <meta property="og:description" content="Create, edit, and format documents online for free.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="A Nice Text Editor">


    <meta name="theme-color" content="#4a90e2">


    <link rel="icon" type="image/png" href="favicon.png">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    >

    <link rel="stylesheet" href="project1.css">
</head>

<body>  
    
    <div class="container">
        <div class="toolbar">
            <div class="head">
                <input
                    type="text"
                    placeholder="File Name"
                    id="filename"
                />

                <select onchange="handelFileExport(this.value); this.selectedIndex=0">
                    <option value="" selected hidden>File</option>
                    <option value="new">New File</option>
                    <option value="pdf">Save as pdf</option>
                    <option value="txt">save as text</option>
                </select>

                <select onchange="formatDoc('formatBlock', this.value); this.selectedIndex=0">
                    <option value="" selected hidden>Format</option>
                    <option value="h1">Header1</option>
                    <option value="h2">Header2</option>
                    <option value="h3">Header3</option>
                    <option value="h4">Header4</option>
                    <option value="h5">Header5</option>
                    <option value="h6">Header6</option>
                    <option value="p">Paragraph</option>
                </select>

                <select onchange="formatDoc('fontSize', this.value); this.selectedIndex=0">
                    <option value="" selected hidden>Font Size</option>
                    <option value="1">Extra Small</option>
                    <option value="2">Small</option>
                    <option value="3">Medium</option>
                    <option value="4">Large</option>
                    <option value="5">Extra Large</option>
                    <option value="6">Big</option>
                </select>

                <div class="color">
                    <span>Color</span>
                    <input type="color" oninput="formatDoc('foreColor', this.value); this.value = '#111'">
                </div>
                <div class="color">
                    <span>BackGround Color</span>
                    <input type="color" oninput="formatDoc('hiliteColor', this.value); this.value = '#111'">
                </div>

            </div>
            
            <div class="btn-toolbar">
                <button onclick="formatDoc('undo')"><i class="fa-solid fa-rotate-left"></i></button>
                <button onclick="formatDoc('redo')"><i class="fa-solid fa-rotate-right"></i></button>
                <button onclick="formatDoc('bold')"><i class="fa-solid fa-bold"></i></button>
                <button onclick="formatDoc('underline')"><i class="fa-solid fa-underline"></i></button>
                <button onclick="formatDoc('italic')"><i class="fa-solid fa-italic"></i></button>
                <button onclick="formatDoc('strikethrough')"><i class="fa-solid fa-strikethrough"></i></button>
                <button onclick="formatDoc('justifyLeft')"><i class="fa-solid fa-align-left"></i></button>
                <button onclick="formatDoc('justifyCenter')"><i class="fa-solid fa-align-center"></i></button>
                <button onclick="formatDoc('justifyRight')"><i class="fa-solid fa-align-right"></i></button>
                <button onclick="formatDoc('justifyFull')"><i class="fa-solid fa-align-justify"></i></button>
                <button onclick="formatDoc('insertOrderedList')"><i class="fa-solid fa-list-ol"></i></button>
                <button onclick="formatDoc('insertUnorderedList')"><i class="fa-solid fa-list"></i></button>
                <button onclick="handelLink()"><i class="fa-solid fa-link"></i></button>
                <button onclick="formatDoc('unLink')"><i class="fa-solid fa-link-slash"></i></button>
                <button data-active="false" id="show-code"><i class="fa-solid fa-code"></i></button>

            </div>
        </div>

        <div id="content" contenteditable="true"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="project1.js"></script>
</body>
</html>
